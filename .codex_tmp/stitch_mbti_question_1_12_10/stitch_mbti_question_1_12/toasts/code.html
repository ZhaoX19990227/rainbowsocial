            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},

<style>
        .glass-toast {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface">
<!-- Background Context: Editorial Profile View -->
<div class="fixed inset-0 overflow-hidden pointer-events-none select-none">
<div class="grid grid-cols-2 h-full gap-4 p-6 opacity-40 blur-sm">
<div class="aspect-[3/4] rounded-xl bg-surface-container-low overflow-hidden">
<img alt="Handsome model in artistic lighting" class="w-full h-full object-cover" data-alt="Portrait of a handsome man in soft artistic studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQeeCdEhSjJoilQdtP1nbIHj0YN9tzTcPnAo4H7crp-Lb4dBz5tdVjPZFrOfUUeARlWvX_lRtj8jZrT8oUPYYonQZZNMywW_aMlQK8onn5LAVFNuThKPOiPLcGBiHEXq1Q8YM9y3Dnoy_DNLyCuVPxGqHYAkkgiajIpSNLI4GDEz5sH97naOyNryxqv0Eo_cGrhMyV8haROIPiaoP-o-YWuHcvy4letK5AYudkZRsBxy5zVT0_7RNrWIQ4JNSqzq1i_He9yB-kFmiB"/>
</div>
<div class="space-y-4">
<div class="aspect-square rounded-xl bg-surface-container-low overflow-hidden">
<img alt="Casual street style photography" class="w-full h-full object-cover" data-alt="Close up of a person wearing stylish modern fashion" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxSX6Mt7osSBxSmc5xp8mEv1CX_i4WcJ3Nf6AJXgVVJB5YtIMWUlp2QJsZKxNfhGhouN1o13k5-Gg68Pw5is2ESWkWuDOV3WFUH5bgtvLw8yZAlYX-3CFVETSJ2or5PTbd-IEUGxAi_ACP5dkDyZLb1MhfCO32mWtjW6DnFo9ZIngx-ByVoICX8-bJu_G_yBPaa_AeLo9vY0tI9_5pfph2vxdEvnxGroKdvHSNxzReZnt8jekB18mOni_fsd3WucP2rsOgNdbtLTIr"/>
</div>
<div class="aspect-[4/3] rounded-xl bg-surface-container-low overflow-hidden">
<img alt="High-end lifestyle interior" class="w-full h-full object-cover" data-alt="Sophisticated interior design with warm soft lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuTdh83wFYZAlTjLyMQxcrWVwthVY09jKrw30-wvIp_dqa5yuuFRrOGdK9y2j-0EZcNhkI0C26GhztDgb7ho65jP2Alqc4G3nSQeNJOBlEeQJMQAdcTld3nH-nzwage-6tKOS3L99tOLx9G0tH71Sd610Is6jVekKxs-e9dSz_pmwXdpOVL4bTLw30mHojsb8cT_5RDnJKFFNaaWpYCje-fnHfmihRAD0Hz41Eb76Jlxqbl4ZUsnn_-aLQIHjNaOYj8VM-9B93LyUK"/>
</div>
</div>
</div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 left-0 w-full px-6 py-4 flex items-center justify-between bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl z-50 shadow-[0px_16px_40px_rgba(125,56,196,0.08)]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-600">menu</span>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-2xl font-black bg-gradient-to-br from-purple-600 to-purple-400 bg-clip-text text-transparent">Luminous</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-primary-container">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="User profile avatar close up face" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBH3u8RaaddwzqEAhjGw1cDYlgO4dPYzGzWPc-KV-YcUI0QyVBfpxatEpBFE5fYla_13n-QaNupyV5zXm_lkQ0-IygWjGErInsJM-cSHRWFl9Pm365v7Fth2-bjggzZpjE-zT9dhIiatNRE6DYKFAoW01AdxdXWFVn-OP1-VMpbpuiYuUCcpN4crmZ7SYwACFA1lMeQF8iTtWCmo8ccNdUHekddjzPXtrAmQ56r_rZD68uyUwfBdAYzMKoXQ1BuMsE0eHz3Pt1IEguF"/>
</div>
</header>
<!-- TOAST COLLECTION CONTAINER -->
<main class="relative z-10 min-h-screen flex flex-col items-center justify-center p-8 space-y-8">
<!-- 1. 已收藏 (Saved) -->
<div class="glass-toast px-6 py-3 rounded-full flex items-center gap-3 shadow-[0px_16px_40px_rgba(125,56,196,0.12)] border border-white/20">
<span class="material-symbols-outlined text-primary filled-icon" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-semibold text-on-surface tracking-wide">已收藏</span>
</div>
<!-- 2. 正在连接... (Connecting) -->
<div class="glass-toast px-8 py-4 rounded-xl flex flex-col items-center gap-3 shadow-[0px_20px_50px_rgba(125,56,196,0.15)] border border-white/30">
<div class="relative w-8 h-8">
<div class="absolute inset-0 border-4 border-primary-container opacity-20 rounded-full"></div>
<div class="absolute inset-0 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
<div class="absolute inset-0 blur-md bg-primary/20 rounded-full"></div>
</div>
<span class="font-medium text-primary tracking-widest text-sm">正在连接...</span>
</div>
<!-- 3. 消息已撤回 (Message Withdrawn) -->
<div class="glass-toast px-5 py-2.5 rounded-lg flex items-center gap-3 shadow-[0px_10px_30px_rgba(0,0,0,0.05)] border border-white/10">
<span class="material-symbols-outlined text-on-surface-variant text-[20px]">undo</span>
<span class="text-on-surface-variant text-sm font-medium">消息已撤回</span>
</div>
<!-- 4. 定位刷新成功 (Location Refreshed) -->
<div class="glass-toast px-6 py-3 rounded-full flex items-center gap-3 shadow-[0px_16px_40px_rgba(125,56,196,0.12)] border border-white/20">
<div class="flex items-center">
<span class="material-symbols-outlined text-secondary">location_on</span>
<span class="material-symbols-outlined text-primary text-[16px] -ml-2 -mt-3 filled-icon" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span class="font-semibold text-on-surface tracking-wide">定位刷新成功</span>
</div>
<!-- 5. 网络异常 (Network Error) -->
<div class="glass-toast px-6 py-3.5 rounded-2xl flex items-center gap-4 shadow-[0px_20px_45px_rgba(163,41,117,0.1)] border border-tertiary-container/10">
<div class="w-10 h-10 rounded-full bg-tertiary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">wifi_off</span>
</div>
<div class="flex flex-col">
<span class="text-tertiary font-bold text-sm">网络异常</span>
<span class="text-on-surface-variant text-[11px] uppercase tracking-tighter">请检查您的联网设置</span>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-8 pt-4 bg-white/70 dark:bg-slate-900/70 backdrop-blur-2xl rounded-t-[3rem] shadow-[0px_-10px_40px_rgba(125,56,196,0.12)]">
<div class="flex items-center justify-center w-12 h-12 text-slate-400 dark:text-slate-500 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined">home</span>
</div>
<div class="flex items-center justify-center w-12 h-12 text-slate-400 dark:text-slate-500 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined">explore</span>
</div>
<div class="flex items-center justify-center w-12 h-12 bg-gradient-to-br from-purple-600 to-purple-400 text-white rounded-full shadow-lg shadow-purple-500/30 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined">add_circle</span>
</div>
<div class="flex items-center justify-center w-12 h-12 text-slate-400 dark:text-slate-500 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined">chat_bubble</span>
</div>
<div class="flex items-center justify-center w-12 h-12 text-slate-400 dark:text-slate-500 hover:scale-110 transition-transform cursor-pointer">
<span class="material-symbols-outlined">person</span>
</div>
</nav>
</body></html>
