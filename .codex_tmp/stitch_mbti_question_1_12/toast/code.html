<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .identity-glow {
            box-shadow: 0px 16px 40px rgba(125, 56, 196, 0.08);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "inverse-primary": "#dbb8ff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#7d38c4",
                        "surface-container": "#eceef3",
                        "secondary-container": "#4aa5fd",
                        "surface-container-highest": "#e1e2e7",
                        "on-secondary-fixed-variant": "#00497e",
                        "surface-bright": "#f8f9fe",
                        "on-primary-container": "#fffbff",
                        "on-tertiary-container": "#fffbff",
                        "on-primary-fixed-variant": "#6417ab",
                        "surface-dim": "#d8dadf",
                        "tertiary": "#a32975",
                        "surface-variant": "#e1e2e7",
                        "outline": "#7d7384",
                        "on-surface-variant": "#4c4453",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e7e8ed",
                        "on-secondary-container": "#003964",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#eff0f5",
                        "primary": "#7b36c2",
                        "secondary": "#0061a5",
                        "secondary-fixed": "#d2e4ff",
                        "on-background": "#191c1f",
                        "inverse-surface": "#2e3134",
                        "on-tertiary": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#001d37",
                        "on-primary-fixed": "#2b0052",
                        "tertiary-fixed": "#ffd8e8",
                        "tertiary-container": "#c2438f",
                        "on-tertiary-fixed": "#3c0028",
                        "surface-container-low": "#f2f3f8",
                        "on-tertiary-fixed-variant": "#870a5f",
                        "secondary-fixed-dim": "#9fcaff",
                        "primary-fixed": "#efdbff",
                        "primary-fixed-dim": "#dbb8ff",
                        "primary-container": "#9552dd",
                        "error": "#ba1a1a",
                        "outline-variant": "#cec2d5",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffafd6",
                        "on-surface": "#191c1f",
                        "background": "#f8f9fe",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9fe"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-xl shadow-[0px_16px_40px_rgba(125,56,196,0.08)] flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container">
<img class="w-full h-full object-cover" data-alt="User profile photo avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAsGebWOf9b0tNfnSRhWcvpWQpMA4cuQKiUQgoUxrrzE0s4c0GSXGr_m6Rtel6sJ4_W9zf07bzLN61le0-49r6K3ocZKDPTZCj0P4cjJW1wBrdrTGEdcr2uwtqVpC9sQ8cznr-sucVUkyr2jDmQgGlJ-UgUN9YCM_oEqTKoRMdxHl47GotXxTWhOcaEwnTW9-abW4E0xA_dJRn9JPnR-AgVcs7jmB2zr7tvMl_bC6LzVQhGNbA3r7DjJ3EsH_IkrdO84zWu7gRhfLFa"/>
</div>
</div>
<h1 class="font-headline font-black text-2xl bg-gradient-to-br from-purple-600 to-pink-500 bg-clip-text text-transparent">Luminous</h1>
<button class="text-slate-400 hover:opacity-80 transition-opacity active:scale-95 active:duration-150">
<span class="material-symbols-outlined text-purple-600">notifications</span>
</button>
</nav>
<!-- Main Content Canvas (Recommendation Feed) -->
<main class="flex-1 pt-24 pb-32 px-6">
<div class="max-w-md mx-auto space-y-8">
<!-- Bento Profile Card 1 (Active Context) -->
<div class="relative group">
<div class="w-full aspect-[3/4] rounded-xl overflow-hidden shadow-xl">
<img class="w-full h-full object-cover" data-alt="Handsome young man posing outdoors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuuI6OsOwCweJuAtgGECGxVv8OQiugkHFtqHB8jUFSKI3wibzrsqls_LfuoXU6Bxcn_JWQxl54ZkFKzZ3mwP0UUvTrFkZxLPh5SJPs4nAdz8ujlLAp7USIWELvDx9xGUP5CUboMdTNAz42QccfIs-74U0ZXxXTPKyRJYywThEge7LccicV2fc9GSfNftqCM3YKmmeg4PrnuetA6B8GS1yoQeO4ebQML5Xl1MjIYcp2rp8PB09PDd9L5qPvsDEWGUsDFIBKyGFp-Iiz"/>
<!-- Overlay Gradient -->
<div class="absolute inset-0 bg-gradient-to-t from-on-background/60 via-transparent to-transparent"></div>
<!-- Profile Info Overlay -->
<div class="absolute bottom-0 left-0 p-8 w-full">
<div class="flex items-end justify-between">
<div>
<h2 class="font-headline text-white text-3xl font-bold tracking-tight">Liam, 24</h2>
<div class="flex gap-2 mt-2">
<span class="bg-white/20 backdrop-blur-md text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Artist</span>
<span class="bg-white/20 backdrop-blur-md text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">1.2km away</span>
</div>
</div>
<div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
</div>
</div>
</div>
</div>
<!-- Profile Metadata Row (Asymmetric) -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-lg identity-glow">
<span class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider block mb-2">Interest</span>
<p class="font-headline text-primary font-bold">Contemporary Art</p>
</div>
<div class="bg-primary p-6 rounded-lg shadow-lg shadow-primary/20 flex flex-col justify-between">
<span class="text-primary-fixed text-xs font-semibold uppercase tracking-wider block">Bio</span>
<p class="text-white font-medium text-sm leading-relaxed">Looking for someone to explore galleries with...</p>
</div>
</div>
</div>
</main>
<!-- SYSTEM FEEDBACK TOAST (SNACKBAR) -->
<!-- Positioned near the bottom but above the nav -->
<div class="fixed bottom-28 left-0 w-full px-6 z-[60] flex justify-center pointer-events-none">
<div class="glass-card identity-glow rounded-full px-6 py-4 flex items-center gap-4 max-w-sm pointer-events-auto border border-white/40">
<!-- Gradient Icon Circle -->
<div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-500/20">
<span class="material-symbols-outlined text-white text-xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<!-- Message Content -->
<div class="flex flex-col">
<p class="font-body font-bold text-on-surface text-sm leading-tight">已发送喜欢，等待对方回应哦～</p>
<p class="font-body text-on-surface-variant text-[11px] font-medium opacity-70">对方会很快收到你的心意</p>
</div>
</div>
</div>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-white/70 backdrop-blur-2xl rounded-t-[3rem] z-50 shadow-[0px_-8px_24px_rgba(125,56,196,0.05)]">
<div class="flex items-center justify-center text-slate-400 p-3 hover:text-purple-500 transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:text-purple-500 transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="search">search</span>
</div>
<div class="flex items-center justify-center bg-gradient-to-br from-purple-600 to-pink-500 text-white rounded-full p-3 shadow-lg shadow-purple-500/30 active:scale-110 transition-transform duration-300 ease-out">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:text-purple-500 transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span>
</div>
<div class="flex items-center justify-center text-slate-400 p-3 hover:text-purple-500 transition-all active:scale-110">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
</footer>
</body></html>
