<body class="bg-background font-body text-on-surface antialiased">

</div>
<div class="flex flex-col items-end gap-1">
<span class="px-3 py-1 bg-primary/10 text-primary text-xs font-bold rounded-full">ENFP</span>
<span class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Active Now</span>
</div>
</div>
</div>
</div>
</section>
<!-- Modular Card Layout (Asymmetrical/Staggered) -->
<section class="grid grid-cols-2 gap-4 mt-8">
<!-- Left Column -->
<div class="space-y-4">
<!-- MBTI Card -->
<div class="bg-surface-container-lowest p-6 rounded-lg shadow-sm">
<div class="w-10 h-10 rounded-full bg-purple-50 flex items-center justify-center mb-4">

</div>
</div>

<div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center mb-4">

</div>

<p class="text-sm text-on-surface-variant">平衡与美感</p>
</div>
<!-- Spotify/Mood Card (Example of Luxury Feel) -->
<div class="bg-gradient-to-br from-primary to-primary-container p-6 rounded-lg shadow-[0px_8px_24px_rgba(123,54,194,0.2)] text-white">
<div class="flex justify-between items-start mb-6">
<span class="material-symbols-outlined opacity-80" data-icon="graphic_eq">graphic_eq</span>

</div>
<p class="font-headline font-bold text-lg leading-tight">City Lights &amp; Coffee</p>

</div>
</div>
</section>

<section class="mt-12 px-2">
<h3 class="font-headline font-bold text-xl text-on-surface mb-4">关于我</h3>
<p class="text-on-surface-variant leading-relaxed text-lg font-light">
                相信设计不仅是空间的堆砌，更是灵魂的栖息。在深夜的城市街道寻找灵感，在清晨的第一杯手冲咖啡中唤醒感官。希望能在这个忙碌的世界里，与你分享一份名为“温柔”的坚持。
            </p>
</section>
</main>
<!-- Refined Action Bar -->
<footer class="fixed bottom-0 left-0 w-full z-50 px-8 pb-10 pt-4 bg-white/70 backdrop-blur-3xl rounded-t-xl flex justify-center items-center gap-6 shadow-[0px_-10px_40px_rgba(125,56,196,0.1)]">
<!-- Like Action -->
<button class="flex-1 max-w-[140px] flex items-center justify-center gap-2 bg-surface-container-highest text-primary font-bold py-4 px-6 rounded-full hover:scale-105 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span>喜欢</span>
</button>
<!-- Primary Chat CTA -->
<button class="flex-[1.5] max-w-[200px] flex items-center justify-center gap-2 bg-gradient-to-br from-purple-600 to-purple-400 text-white font-bold py-4 px-8 rounded-full shadow-[0px_8px_24px_rgba(123,54,194,0.3)] hover:scale-105 transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="chat_bubble" style="font-variation-settings: 'FILL' 1;">chat_bubble</span>
<span>打个招呼</span>
</button>
</footer>
<!-- Bottom Navigation Layer (Hidden for focused detail view as per mandate) -->
