<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Quicksand:wght@500;600;700&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "error-container": "#ffdad6",
              "on-tertiary-container": "#fffbff",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#ffafd6",
              "inverse-on-surface": "#eff0f5",
              "on-tertiary-fixed": "#3c0028",
              "secondary-fixed": "#d2e4ff",
              "on-primary-fixed": "#2b0052",
              "surface-container-highest": "#e1e2e7",
              "tertiary": "#a32975",
              "on-secondary-fixed": "#001d37",
              "background": "#fbfcfe",
              "on-background": "#191c1f",
              "tertiary-fixed": "#ffd8e8",
              "outline": "#7d7384",
              "secondary": "#0061a5",
              "outline-variant": "#cec2d5",
              "on-error": "#ffffff",
              "surface-bright": "#fbfcfe",
              "surface-container-low": "#f2f3f8",
              "inverse-surface": "#2e3134",
              "surface-dim": "#d8dadf",
              "surface-tint": "#7d38c4",
              "secondary-fixed-dim": "#9fcaff",
              "surface-container": "#eceef3",
              "primary-fixed-dim": "#dbb8ff",
              "primary-container": "#9552dd",
              "primary-fixed": "#efdbff",
              "on-secondary": "#ffffff",
              "on-error-container": "#93000a",
              "secondary-container": "#4aa5fd",
              "on-tertiary": "#ffffff",
              "on-surface-variant": "#4c4453",
              "error": "#ba1a1a",
              "on-primary-container": "#fffbff",
              "surface": "#fbfcfe",
              "on-secondary-container": "#003964",
              "on-primary-fixed-variant": "#6417ab",
              "tertiary-container": "#c2438f",
              "on-surface": "#191c1f",
              "surface-container-lowest": "#ffffff",
              "inverse-primary": "#dbb8ff",
              "surface-container-high": "#e7e8ed",
              "primary": "#8b45d1",
              "on-tertiary-fixed-variant": "#870a5f",
              "surface-variant": "#e1e2e7",
              "on-secondary-fixed-variant": "#00497e"
            },
            fontFamily: {
              "headline": ["Quicksand", "Plus Jakarta Sans", "sans-serif"],
              "body": ["Quicksand", "Manrope", "sans-serif"],
              "label": ["Quicksand", "Manrope", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "1.5rem",
              "lg": "2.5rem",
              "xl": "3.5rem",
              "full": "9999px"
            },
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ethereal-gradient {
            background: 
                radial-gradient(circle at 10% 10%, rgba(239, 219, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 90% 90%, rgba(210, 228, 255, 0.5) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(255, 216, 232, 0.4) 0%, transparent 70%),
                #fbfcfe;
        }
        .halo-layer {
            position: absolute;
            border-radius: 9999px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(125, 56, 196, 0.08);
        }
        .soft-shadow {
            box-shadow: 0 20px 40px -12px rgba(123, 54, 194, 0.25);
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden selection:bg-primary/20">
<!-- Ethereal Background Canvas -->
<div class="fixed inset-0 ethereal-gradient z-0"></div>
<!-- Main Experience Layer -->
<div class="relative min-h-screen flex flex-col z-10">
<!-- Header / Close Action -->
<header class="flex justify-end items-center px-6 py-6 w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full glass-panel hover:bg-white/60 transition-all active:scale-90 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary" data-icon="close">close</span>
</button>
</header>
<!-- Content Area: The Core Emotion -->
<main class="flex-grow flex flex-col items-center justify-center px-8 -mt-10">
<!-- Headline Group -->
<div class="text-center mb-12">
<h1 class="font-headline font-bold text-5xl md:text-6xl tracking-tight bg-gradient-to-br from-primary via-primary-container to-tertiary bg-clip-text text-transparent mb-4 leading-tight">
                    有人喜欢了你
                </h1>
<p class="font-body text-on-surface-variant/70 text-lg md:text-xl font-semibold tracking-wide">
                    快来看看是谁对你心动了吧
                </p>
</div>
<!-- Central Visual: The Identity Glow -->
<div class="relative w-72 h-72 md:w-96 md:h-96 flex items-center justify-center">
<!-- Halo Effects -->
<div class="halo-layer w-full h-full bg-primary/5 blur-[80px] scale-125 animate-pulse"></div>
<div class="halo-layer w-[95%] h-[95%] border border-primary/10 glass-panel opacity-60"></div>
<div class="halo-layer w-[85%] h-[85%] border border-white/40 scale-105 shadow-inner"></div>
<div class="halo-layer w-[75%] h-[75%] bg-gradient-to-tr from-primary/15 to-tertiary/15 blur-sm"></div>
<!-- Decorative Elements -->
<div class="absolute -top-6 -right-2 w-12 h-12 glass-panel rounded-full flex items-center justify-center text-tertiary soft-shadow animate-bounce" style="animation-duration: 3s;">
<span class="material-symbols-outlined text-2xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="absolute bottom-10 -left-8 w-10 h-10 glass-panel rounded-full flex items-center justify-center text-primary/80 soft-shadow animate-pulse">
<span class="material-symbols-outlined text-lg" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<!-- Main Profile Image -->
<div class="relative w-60 h-60 md:w-76 md:h-76 rounded-full overflow-hidden soft-shadow border-8 border-white/90 z-20 group cursor-pointer">
<img alt="Mystery Profile" class="w-full h-full object-cover grayscale brightness-110 blur-md transition-all duration-700 group-hover:scale-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbnfIndAe8A_-PQdwCg2GjE_MEf6CmYXpm3u2GfWlBtNsqtDZ6-nLBUJsn4o4qYTd8jyeSFyfSmsS4kdRAaHV8ZfRqpXtOof6wnaJbRPZ94l6tJJ2W-4b0qXrC9dPI8Hydu1bXFNXxpex-3TX45J1Pp_T5WVHNrV5eRjywn4y4oWVns_JfcFqHkaYOypybLviQhMmazPw5EcVQvVCUQp2-BrQMnoZ7a-ltMI31GlyfFVSgCeWGU0W2KAW-kyAPKuLosqAYYsWmZmOr"/>
<!-- Identity Reveal Overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-transparent via-white/10 to-primary/30 flex items-center justify-center">
<div class="bg-white/30 backdrop-blur-2xl px-8 py-3 rounded-full border border-white/50 shadow-lg">
<span class="text-white font-bold tracking-[0.2em] text-sm uppercase">点击解锁</span>
</div>
</div>
</div>
<!-- Luminous Particles -->
<div class="absolute top-1/4 -right-4 w-3 h-3 rounded-full bg-primary/40 blur-[1px] animate-ping"></div>
<div class="absolute bottom-1/4 -left-2 w-4 h-4 rounded-full bg-secondary-fixed/50 blur-[2px]"></div>
</div>
</main>
<!-- Interaction Footer -->
<footer class="w-full max-w-sm mx-auto px-6 pb-12 flex flex-col gap-5">
<!-- Primary Action -->
<button class="w-full h-18 py-5 rounded-[2rem] bg-gradient-to-r from-primary via-primary-container to-primary text-white font-headline font-bold text-xl soft-shadow active:scale-95 hover:brightness-105 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-2xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
                回个喜欢
            </button>
<!-- Secondary Action -->
<button class="w-full h-16 py-4 rounded-[1.75rem] glass-panel text-primary font-body font-bold text-lg hover:bg-white/60 active:scale-95 transition-all">
                先看看
            </button>
</footer>
</div>
<!-- Decorative Bottom Gradient for Depth -->
<div class="fixed bottom-0 left-0 w-full h-80 bg-gradient-to-t from-white/60 to-transparent pointer-events-none z-[5]"></div>
</body></html>
