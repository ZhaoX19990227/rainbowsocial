services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rainbowsocial-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8088"
    volumes:
      - ./media:/data

  web:
    image: nginx:1.27-alpine
    container_name: rainbowsocial-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./site:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
