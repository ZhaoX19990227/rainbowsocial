<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#ffafd6",
              "inverse-on-surface": "#eff0f5",
              "primary": "#7b36c2",
              "surface-tint": "#7d38c4",
              "on-background": "#191c1f",
              "inverse-primary": "#dbb8ff",
              "surface-container": "#eceef3",
              "outline": "#7d7384",
              "tertiary-container": "#c2438f",
              "tertiary": "#a32975",
              "surface-container-high": "#e7e8ed",
              "on-tertiary-fixed-variant": "#870a5f",
              "surface-dim": "#d8dadf",
              "primary-fixed-dim": "#dbb8ff",
              "primary-container": "#9552dd",
              "primary-fixed": "#efdbff",
              "error-container": "#ffdad6",
              "surface-bright": "#f8f9fe",
              "on-tertiary-container": "#fffbff",
              "surface-container-low": "#f2f3f8",
              "on-secondary-fixed": "#001d37",
              "on-surface-variant": "#4c4453",
              "on-error-container": "#93000a",
              "background": "#f8f9fe",
              "on-surface": "#191c1f",
              "secondary-fixed-dim": "#9fcaff",
              "surface-variant": "#e1e2e7",
              "outline-variant": "#cec2d5",
              "on-error": "#ffffff",
              "on-primary-container": "#fffbff",
              "surface-container-highest": "#e1e2e7",
              "on-secondary": "#ffffff",
              "secondary": "#0061a5",
              "secondary-container": "#4aa5fd",
              "on-secondary-container": "#003964",
              "on-tertiary": "#ffffff",
              "tertiary-fixed": "#ffd8e8",
              "on-primary-fixed": "#2b0052",
              "error": "#ba1a1a",
              "surface": "#f8f9fe",
              "surface-container-lowest": "#ffffff",
              "on-secondary-fixed-variant": "#00497e",
              "secondary-fixed": "#d2e4ff",
              "inverse-surface": "#2e3134",
              "on-tertiary-fixed": "#3c0028",
              "on-primary": "#ffffff",
              "on-primary-fixed-variant": "#6417ab"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .status-card {
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .status-card:active {
            transform: scale(0.95);
        }
        .status-card-selected {
            background: rgba(123, 54, 194, 0.08);
            box-shadow: 0 0 20px rgba(123, 54, 194, 0.15), 0 4px 12px rgba(123, 54, 194, 0.1);
            outline: 2px solid #7b36c2;
        }
        .status-card-selected .material-symbols-outlined {
            font-variation-settings: 'FILL' 1;
            transform: scale(1.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-0 overflow-hidden">
<!-- Background Mockup Content -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 select-none pointer-events-none">
<div class="p-8 space-y-8">
<div class="w-full h-64 bg-surface-container-highest rounded-xl"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-40 bg-surface-container rounded-lg"></div>
<div class="h-40 bg-surface-container rounded-lg"></div>
</div>
</div>
</div>
<!-- Backdrop Overlay -->
<div class="fixed inset-0 bg-black/10 backdrop-blur-md z-40"></div>
<!-- Status Selection Bottom Sheet -->
<div class="fixed bottom-0 left-0 right-0 z-50 flex justify-center px-0">
<div class="w-full max-w-lg glass-panel rounded-t-[3rem] shadow-[0px_-25px_80px_rgba(0,0,0,0.15)] overflow-hidden transition-all duration-500 transform translate-y-0">
<!-- Handlebar -->
<div class="flex justify-center pt-6 pb-2">
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full"></div>
</div>
<!-- Header -->
<div class="px-8 pt-4 pb-6 text-center relative">
<h1 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface mb-2">今日状态</h1>
<p class="font-body text-sm text-on-surface-variant/70">状态仅生效24小时，到期自动结束</p>
<!-- Custom Entry Top Right (Alternative placement as requested) -->
<button class="absolute right-8 top-1/2 -translate-y-1/2 p-2 bg-primary/5 rounded-full text-primary hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="edit">edit</span>
</button>
</div>
<!-- Scrollable Content Area -->
<div class="px-6 max-h-[55vh] overflow-y-auto pb-6 custom-scrollbar">
<div class="grid grid-cols-4 gap-3.5">
<!-- Row 1 -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="settings_night_sight">settings_night_sight</span>
<span class="text-[11px] font-bold text-on-surface-variant">发呆</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="bedtime">bedtime</span>
<span class="text-[11px] font-bold text-on-surface-variant">疲惫</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl status-card-selected ring-inset">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="headset">headset</span>
<span class="text-[11px] font-bold text-primary">听歌</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="wb_sunny">wb_sunny</span>
<span class="text-[11px] font-bold text-on-surface-variant">等天晴</span>
</button>
<!-- Row 2 -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="local_activity">local_activity</span>
<span class="text-[11px] font-bold text-on-surface-variant">求约</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="construction">construction</span>
<span class="text-[11px] font-bold text-on-surface-variant">搬砖</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="set_meal">set_meal</span>
<span class="text-[11px] font-bold text-on-surface-variant">摸鱼</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="flight_takeoff">flight_takeoff</span>
<span class="text-[11px] font-bold text-on-surface-variant">出差</span>
</button>
<!-- Row 3 -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="bubble_chart">bubble_chart</span>
<span class="text-[11px] font-bold text-on-surface-variant">喝奶茶</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="coffee">coffee</span>
<span class="text-[11px] font-bold text-on-surface-variant">喝咖啡</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="weekend">weekend</span>
<span class="text-[11px] font-bold text-on-surface-variant">宅</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="sports_esports">sports_esports</span>
<span class="text-[11px] font-bold text-on-surface-variant">打游戏</span>
</button>
<!-- Row 4 -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="fitness_center">fitness_center</span>
<span class="text-[11px] font-bold text-on-surface-variant">健身中</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="landscape">landscape</span>
<span class="text-[11px] font-bold text-on-surface-variant">旅行中</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="lock">lock</span>
<span class="text-[11px] font-bold text-on-surface-variant">闭关中</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="favorite">favorite</span>
<span class="text-[11px] font-bold text-on-surface-variant">恋爱中</span>
</button>
<!-- Row 5 -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="pets">pets</span>
<span class="text-[11px] font-bold text-on-surface-variant">单身汪</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="restaurant">restaurant</span>
<span class="text-[11px] font-bold text-on-surface-variant">干饭中</span>
</button>
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-white/60 hover:bg-white transition-all">
<span class="material-symbols-outlined text-primary text-[28px] mb-2 transition-transform duration-300" data-icon="book">book</span>
<span class="text-[11px] font-bold text-on-surface-variant">学习中</span>
</button>
<!-- Distinctive Custom Button -->
<button class="status-card flex flex-col items-center justify-center py-4 px-2 rounded-2xl bg-gradient-to-br from-white/80 to-primary/5 hover:from-white hover:to-primary/10 transition-all border border-dashed border-primary/30">
<span class="material-symbols-outlined text-primary text-[28px] mb-2" data-icon="add">add</span>
<span class="text-[11px] font-bold text-primary">自定义</span>
</button>
</div>
</div>
<!-- Sticky Footer Actions -->
<div class="px-8 pb-12 pt-6 bg-white/40 backdrop-blur-xl border-t border-white/50 flex flex-col gap-4">
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg rounded-[1.25rem] shadow-[0px_12px_32px_rgba(125,56,196,0.35)] hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                保存状态
            </button>
<button class="w-full py-2 text-on-surface-variant/60 font-label font-bold text-sm hover:text-primary transition-colors flex items-center justify-center gap-1 opacity-60">
<span class="material-symbols-outlined text-[18px]" data-icon="restart_alt">restart_alt</span>
                恢复默认
            </button>
</div>
</div>
</div>
<!-- Bottom Navigation Bar (Visual Anchor) -->
<nav class="fixed bottom-0 w-full z-[60] rounded-t-[2.5rem] bg-white/90 backdrop-blur-2xl border-t border-outline-variant/10 md:hidden">
<div class="flex justify-around items-center px-6 pb-6 pt-3">
<div class="text-slate-400 p-2"><span class="material-symbols-outlined" data-icon="explore">explore</span></div>
<div class="text-slate-400 p-2"><span class="material-symbols-outlined" data-icon="style">style</span></div>
<div class="relative -mt-10">
<div class="absolute inset-0 bg-primary/20 blur-xl rounded-full"></div>
<div class="relative bg-gradient-to-br from-primary to-primary-container text-white rounded-full p-4 shadow-lg shadow-primary/30">
<span class="material-symbols-outlined text-[28px]" data-icon="add">add</span>
</div>
</div>
<div class="text-slate-400 p-2"><span class="material-symbols-outlined" data-icon="chat_bubble">chat_bubble</span></div>
<div class="text-slate-400 p-2"><span class="material-symbols-outlined" data-icon="person">person</span></div>
</div>
</nav>
</body></html>
